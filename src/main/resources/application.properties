resilience4j.circuitbreaker.instances.resourcesService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.resourcesService.sliding-window-size=5
resilience4j.circuitbreaker.instances.resourcesService.permitted-number-of-calls-in-half-open-state=2

resilience4j.circuitbreaker.instances.collaborationService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.collaborationService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.collaborationService.sliding-window-size=5
resilience4j.circuitbreaker.instances.collaborationService.permitted-number-of-calls-in-half-open-state=2

